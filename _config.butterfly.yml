#导航栏
nav:
  logo: /image/logo_2.gif
  display_title: true
  fixed: false # fixed navigation bar
  post_asset_folder: true

# footer_img: "linear-gradient(20deg, #0062be, #925696, #cc426e, #fb0347)"
footer_img: true
background: https://raw.githubusercontent.com/Lucky1192405754/Lucky1192405754.github.io/main/image/bg_16.png
# background: "linear-gradient(20deg, #0062be, #925696, #cc426e, #fb0347)"
# background: "linear-gradient(145deg, #654ea3, #eaafc8)"

menu:
  首页: / || fas fa-home
  时间轴: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  清单||fa fa-heartbeat:
    音乐: /music/ || fas fa-music
    照片: /Gallery/ || fas fa-images
    电影: /movies/ || fas fa-video

#头像
avatar:
  img: /image/avatar.png
  effect: false # 头像会一直转，转的贼快，太鬼畜了

#顶部图
index_img: /image/bg_2.png
default_top_img: /image/bg_2.png

# Choose: fancybox / medium_zoom 
# https://github.com/francoischalifour/medium-zoom 
# https://fancyapps.com/fancybox/ 
# Leave it empty if you don't need lightbox 
lightbox: fancybox

# pjax: enable: false # Exclude the specified pages from pjax, such as '/music/' exclude: # - /xxxxxx/

# Stretches the lines so that each line has equal width（文字向两侧对齐，对最后一行无效）
text_align_justify:  true


#本地搜索
local_search:
  enable: true
  # Preload the search data when the page loads.
  preload: false
  # Show top n results per article, show all results by setting to -1
  top_n_per_article: 1
  # Unescape html strings to the readable one.
  unescape: true
  CDN:

# 背景特效
# canvas_nest:
#   enable: true
#   color: "0, 0, 0" #color of lines, default: '0,0,0'; RGB values: (R,G,B).(note: use ',' to separate.)
#   opacity: 1 # the opacity of line (0~1), default: 0.5.
#   zIndex: -1 # z-index property of the background, default: -1.
#   count: 99 # the number of lines, default: 99.
#   mobile: false # false 手机端不显示 true 手机端显示

canvas_fluttering_ribbon:
  enable: true
  mobile: true # false 手機端不顯示 true 手機端顯示

#加载动画
preloader:
  enable: true
  source: 1 #可选值1=fullpage或2=progress bar，可查看https://codebyzach.github.io/pace/
  pace_css_url:

# # 自定义样式（池塘养鱼）
# inject:
#   head:
#     - <link rel="stylesheet" href="/styles/main.css">
#     - <script src="https://cdn.bootcss.com/jquery/3.4.1/jquery.min.js"></script>
#   bottom:
#     - <script src="/styles/fish.js"></script>

# 网页图标
favicon: ./source/image/planet_output.png

# 主题色
theme_color:
  enable: true
  # 主色：经典深桃红
  main: "#D6336C" # 深桃红（Deep Pink）、对比强烈
  # 分页器：暗樱桃粉
  paginator: "#C0275D" # Cherry Blossom 深调
  # 按钮悬停：玫瑰石英深版
  button_hover: "#B21F59" # Rose Quartz 深版
  # 文本选中：深暮粉
  text_selection: "#A51755" # Magenta Deep
  # 链接颜色：暗珊瑚粉
  link_color: "#8F1350" # Coral Dark
  # 元信息文字色：酒红带紫
  meta_color: "#7A0E4B" # Burgundy Purple
  # 分割线颜色：深粉蓝混合
  hr_color: "#E0619E" # Blush Deep
  # 代码块前景：亮珊瑚
  code_foreground: "#FF4081" # Bright Coral
  # 代码块背景：半透明深粉
  code_background: "rgba(214,51,108,0.1)"
  # 目录高亮：复用主色
  toc_color: "#D6336C"
  # 引用块左侧条：暗蜜桃
  blockquote_padding_color: "#C94574" # Dark Peach
  # 引用块背景：半透明暗粉
  blockquote_background_color: "rgba(201,69,116,0.2)"
  # 滚动条：暗樱桃粉
  scrollbar_color: "#C94574"

mask: # 为 header 或 footer 添加黑色半透遮罩
  header: true
  footer: true

# 代码块美化
highlight_theme: light #  darker / pale night / light / ocean / mac / mac light / false
highlight_copy: true # copy button
highlight_lang: true # show the code language
highlight_shrink: false # true: shrink the code blocks / false: expand the code blocks | none: expand code blocks and hide the button
highlight_height_limit: 400 # unit: px
code_word_wrap: false # 设置代码是否会自动换行

# Global font settings
font:
  global-font-size:
  code-font-size:
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Lato, Roboto, "PingFang SC", "Microsoft JhengHei", "Microsoft YaHei", sans-serif
  code-font-family: consolas, Menlo, "PingFang SC", "Microsoft JhengHei", "Microsoft YaHei", sans-serif

hr_icon: # 水平分隔线图标设置，带个小剪刀图标
  enable: true
  icon: \3423 # the unicode value of Font Awesome icon, such as '\3423'
  icon-top:

# 美化頁面顯示
beautify:
  enable: true
  field: site # site/post
  title-prefix-icon: '\f0c1' #填写的是fontawesome的icon的Unicode数。
  title-prefix-icon-color: "#0062be"

# A simple 404 page
error_404:
  enable: true
  subtitle: "Oops！页面不见啦🎶"
  background:

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://lucky1192405754.github.io
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - "README.md"
  - "projects/**"   
  - "projects/**/*" 

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ""
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ""
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ""

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ""
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: "mtime"

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: butterfly
baidu_analytics: d307051884df6e49bb73adb7336b2992
runtimeshow:
  enable: true
  publish_date: 20/5/2025 00:00:00

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repository: https://github.com/Lucky1192405754/Lucky1192405754.github.io.git
  branch: main
